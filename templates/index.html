{% extends "base.html" %}

{% block title %}ConvertHub — Конвертер изображений{% endblock %}

{% block content %}
<section class="hero">
    <h1 class="hero__title">Convert<span class="accent">Hub</span></h1>
    <p class="hero__subtitle">Конвертируйте изображения — быстро, бесплатно, без регистрации</p>
</section>

<section class="categories">
    <div class="cards-grid">
        <a href="/convert/image" class="card card--active" style="--delay: 0">
            <div class="card__icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="6" y="10" width="36" height="28" rx="4" stroke="currentColor" stroke-width="2"/>
                    <circle cx="18" cy="22" r="4" stroke="currentColor" stroke-width="2"/>
                    <path d="M6 32l10-8 6 5 8-10 12 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h3 class="card__title">Изображения</h3>
            <p class="card__desc">PNG, JPG, WebP, BMP, TIFF, ICO, GIF</p>
            <div class="card__conversions">
                <span class="tag">PNG → WebP</span>
                <span class="tag">JPG → PNG</span>
                <span class="tag">BMP → JPEG</span>
                <span class="tag">+ ещё</span>
            </div>
        </a>
    </div>
</section>
{% endblock %}
